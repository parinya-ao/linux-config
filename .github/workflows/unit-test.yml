name: Unit Tests & Coverage

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          # Added 'fish' to the package list so the linter doesn't try (and fail) to install it later
          sudo apt-get install -y bats shellcheck fish binutils-dev build-essential cmake libssl-dev libcurl4-openssl-dev libelf-dev libstdc++-12-dev zlib1g-dev libdw-dev libiberty-dev
          
          # Build kcov from source (not available as apt package on Ubuntu 24.04)
          git clone --depth 1 --branch v43 https://github.com/SimonKagstrom/kcov.git /tmp/kcov
          cd /tmp/kcov
          mkdir build && cd build
          cmake ..
          make -j$(nproc)
          sudo make install
          cd / && rm -rf /tmp/kcov

      # Installs the Nix environment required by clean.sh and your bats assertions
      - name: Install Nix
        uses: cachix/install-nix-action@v25
        with:
          nix_path: nixpkgs=channel:nixos-unstable

      - name: Run Linter
        run: ./tests/scripts/run-linter.sh

      - name: Run Unit Tests & Coverage
        run: ./tests/scripts/run-coverage.sh

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage_report/