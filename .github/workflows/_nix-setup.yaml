# Shared Nix setup used by both ci.yaml and update.yaml
# Call with: uses: ./.github/workflows/_nix-setup.yaml
name: Nix Setup (Reusable)

on:
  workflow_call:
    inputs:
      free-disk-space:
        description: "Free disk space before Nix install"
        type: boolean
        default: false

jobs:
  setup:
    runs-on: ubuntu-latest
    steps:
      # เพิ่ม disk space เฉพาะเมื่อถูกเรียกขอ (nix-build ขอ, shellcheck ไม่ต้อง)
      - name: Free Disk Space
        if: ${{ inputs.free-disk-space }}
        uses: jlumbroso/free-disk-space@v1.3.1
        with:
          tool-cache: false
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true

      - name: Install Nix
        uses: cachix/install-nix-action@v30
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
            accept-flake-config = true

      - name: Setup Magic Nix Cache
        uses: DeterminateSystems/magic-nix-cache-action@v7
