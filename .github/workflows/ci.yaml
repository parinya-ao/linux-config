name: Linux Config CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─── ด่าน 0: ตรวจว่าไฟล์ไหนเปลี่ยน ─────────────────
  changes:
    name: Detect changed files
    runs-on: ubuntu-latest
    outputs:
      shell: ${{ steps.filter.outputs.shell }}
      nix:   ${{ steps.filter.outputs.nix }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            shell:
              - "**.sh"
              - "distro/**"
              - "steps/**"
              - "lib/**"
              - "startup.sh"
            nix:
              - "**.nix"
              - "flake.lock"

  # ─── ด่าน 1: ShellCheck ──────────────────────────────
  shellcheck:
    name: ShellCheck
    needs: changes
    if: ${{ needs.changes.outputs.shell == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ludeeus/action-shellcheck@2.0.0
        with:
          scandir: "./"
          severity: error
          ignore_paths: ".git"

  # ─── ด่าน 2: Nix Lint (คู่ขนานกับ build) ────────────
  nix-lint:
    name: Nix Lint
    needs: changes
    if: ${{ needs.changes.outputs.nix == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # ⚡ Nix installer (เร็วกว่า cachix/install-nix-action)
      - uses: DeterminateSystems/determinate-nix-action@v3

      # ⚡ Cachix — pull cached tools (statix, deadnix)
      - uses: cachix/cachix-action@v17
        with:
          name: linux-config
          authToken: '${{ secrets.CACHIX_AUTH_TOKEN }}'
          skipPush: true    # lint job ไม่ต้อง push

      # ⚡ รัน lint 3 ตัวพร้อมกัน
      - name: Lint (nixfmt + statix + deadnix) [parallel]
        run: |
          nix fmt -- --ci &
          PID1=$!
          nix run nixpkgs#statix -- check . &
          PID2=$!
          nix run nixpkgs#deadnix -- --fail . &
          PID3=$!

          FAIL=0
          wait $PID1 || FAIL=1
          wait $PID2 || FAIL=1
          wait $PID3 || FAIL=1
          exit $FAIL

  # ─── ด่าน 3: Nix Build (หนักสุด → cache สุดๆ) ──────
  nix-build:
    name: Nix Build
    needs: [changes, nix-lint]
    if: ${{ needs.changes.outputs.nix == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # ⚡ ลบขยะ (10 วินาที แทน 2 นาที)
      - name: Reclaim disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android \
            /opt/ghc /usr/local/share/boost /usr/share/swift \
            /opt/hostedtoolcache 2>/dev/null || true
          sudo docker image prune -af 2>/dev/null || true

      # ⚡ Nix installer
      - uses: DeterminateSystems/determinate-nix-action@v3

      # ⚡⚡ Cachix — pull + push (หัวใจของ speed)
      - uses: cachix/cachix-action@v17
        with:
          name: linux-config
          authToken: '${{ secrets.CACHIX_AUTH_TOKEN }}'
          # push ทุก store path ที่ build ใหม่ขึ้น Cachix
          # ครั้งถัดไป pull ลงมาแทน build

      # ⚡⚡ GitHub Actions Cache (layer 2)
      - uses: nix-community/cache-nix-action@v7
        with:
          primary-key: nix-${{ runner.os }}-${{ hashFiles('flake.lock') }}
          restore-prefixes-first-match: nix-${{ runner.os }}-
          gc-max-store-size-linux: 4G

      # Fail fast: evaluate ก่อน build
      - name: Flake check (no build)
        run: nix flake check --no-build

      # ⚡⚡⚡ Full build — ใช้ทุก core
      - name: Build Home Manager Config
        run: |
          nix build .#homeConfigurations.parinya.activationPackage \
            --no-link \
            --max-jobs auto \
            --cores 0 \
            --print-build-logs

  # ─── Status gate ──────────────────────────────────────
  ci-success:
    name: CI passed
    runs-on: ubuntu-latest
    needs: [shellcheck, nix-lint, nix-build]
    if: always()
    steps:
      - name: Evaluate results
        run: |
          for result in \
            "${{ needs.shellcheck.result }}" \
            "${{ needs.nix-lint.result }}" \
            "${{ needs.nix-build.result }}"; do
            if [[ "$result" != "success" && "$result" != "skipped" ]]; then
              echo "::error::Job failed: $result"
              exit 1
            fi
          done
          echo "All checks passed."
