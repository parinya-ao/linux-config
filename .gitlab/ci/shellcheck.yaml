# shellcheck.yaml — lint Bash/imperative layer
# รันเฉพาะเมื่อ .sh หรือ distro/lib/steps เปลี่ยน

shellcheck:
  stage: lint
  image: koalaman/shellcheck-alpine:stable   # เบากว่า nix image มาก
  before_script: []                           # override .nix-setup before_script
  script:
    - |
      find . -name "*.sh" \
        -not -path "./.git/*" \
        | xargs shellcheck --severity=warning
  rules:
    - changes:
        - "**/*.sh"
        - "startup.sh"
        - "distro/**/*"
        - "steps/**/*"
        - "lib/**/*"
    - if: $CI_PIPELINE_SOURCE == "web"        # manual trigger รันทุก job
