# ── MCP Server Bootstrap — Central Configuration ──────────────────────────────
# Edit this ONE file to control all MCP server deployment.
# Re-run: bash share/mcp/mcp.sh
# ──────────────────────────────────────────────────────────────────────────────

# ── User & Paths ─────────────────────────────────────────────────────────────
# Auto-detected if left empty
USER_HOME="${USER_HOME:-$HOME}"
BUN_BIN_DIR="${BUN_BIN_DIR:-$HOME/.bun/bin}"
BUN_CACHE_DIR="${BUN_CACHE_DIR:-$HOME/.cache/.bun/install/global/node_modules}"
NIX_PROFILE_BIN="${NIX_PROFILE_BIN:-$HOME/.nix-profile/bin}"
NIX_DEFAULT_BIN="${NIX_DEFAULT_BIN:-/nix/var/nix/profiles/default/bin}"

# ── MCP Packages (space-separated: npm_package:binary_name) ──────────────────
# Format: "npm-package-name@optional-version:binary-name"
# If version omitted, latest is used.
MCP_PACKAGES="${MCP_PACKAGES:-@agentmemory/agentmemory:agentmemory @agentmemory/mcp:agentmemory-mcp @colbymchenry/codegraph:codegraph @modelcontextprotocol/server-sequential-thinking:mcp-server-sequential-thinking}"

# ── AgentMemory Settings ─────────────────────────────────────────────────────
AGENTMEMORY_URL="${AGENTMEMORY_URL:-http://localhost:3111}"
AGENTMEMORY_SECRET="${AGENTMEMORY_SECRET:-}"
AGENTMEMORY_TOOLS="${AGENTMEMORY_TOOLS:-all}"

# ── systemd Unit Settings ────────────────────────────────────────────────────
AGENTMEMORY_SYSTEMD_ENABLED="${AGENTMEMORY_SYSTEMD_ENABLED:-true}"
# ExecStart: uses absolute node path + agentmemory entry point
AGENTMEMORY_EXEC="${AGENTMEMORY_EXEC:-$NIX_PROFILE_BIN/node $BUN_CACHE_DIR/@agentmemory/agentmemory/dist/cli.mjs}"
# Timeouts
SYSTEMD_TIMEOUT_START_SEC="${SYSTEMD_TIMEOUT_START_SEC:-30}"
SYSTEMD_TIMEOUT_STOP_SEC="${SYSTEMD_TIMEOUT_STOP_SEC:-15}"
# Restart policy
SYSTEMD_RESTART_SEC="${SYSTEMD_RESTART_SEC:-3}"
SYSTEMD_START_LIMIT_INTERVAL="${SYSTEMD_START_LIMIT_INTERVAL:-120}"
SYSTEMD_START_LIMIT_BURST="${SYSTEMD_START_LIMIT_BURST:-5}"
# Memory limits (cgroup)
SYSTEMD_MEMORY_MAX="${SYSTEMD_MEMORY_MAX:-350M}"
SYSTEMD_MEMORY_HIGH="${SYSTEMD_MEMORY_HIGH:-280M}"
SYSTEMD_OOM_SCORE="${SYSTEMD_OOM_SCORE:-500}"

# ── Node.js Runtime ──────────────────────────────────────────────────────────
NODE_MAX_OLD_SPACE_SIZE="${NODE_MAX_OLD_SPACE_SIZE:-256}"
NODE_UNHANDLED_REJECTIONS="${NODE_UNHANDLED_REJECTIONS:-throw}"

# ── OTel Telemetry ───────────────────────────────────────────────────────────
# Disable OTel to prevent WebSocket reconnect crash loops
OTEL_SDK_DISABLED="${OTEL_SDK_DISABLED:-true}"
OTEL_TRACES_EXPORTER="${OTEL_TRACES_EXPORTER:-none}"
OTEL_METRICS_EXPORTER="${OTEL_METRICS_EXPORTER:-none}"
OTEL_LOGS_EXPORTER="${OTEL_LOGS_EXPORTER:-none}"
PRISMA_DISABLE_TELEMETRY="${PRISMA_DISABLE_TELEMETRY:-1}"
CHECKPOINT_DISABLE="${CHECKPOINT_DISABLE:-1}"

# ── Claude Code MCP Targets ──────────────────────────────────────────────────
# Space-separated list of AI CLIs to inject MCP into
CLAUDE_CLI_TARGETS="${CLAUDE_CLI_TARGETS:-claude opencode antigravity codex}"

# ── OpenCode Config ──────────────────────────────────────────────────────────
OPENCODE_CONFIG_DIR="${OPENCODE_CONFIG_DIR:-$HOME/.config/opencode}"
